# =========================

# SERVER

# =========================

server.port=8080

# =========================

# MYSQL DATABASE

# =========================

spring.datasource.url=jdbc:mysql://localhost:3306/aegis_db?createDatabaseIfNotExist=true

spring.datasource.username=aegis_user

spring.datasource.password=aegis123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================

# JPA / HIBERNATE

# =========================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =========================

# JWT

# =========================

jwt.secret=mySuperSecretKeyForAegisProject2026

jwt.expiration=86400000

# =========================

# GEMINI AI

# =========================

gemini.api.key=${GEMINI_API_KEY}

gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# =========================

# LOGGING

# =========================

logging.level.org.springframework.security=DEBUG
logging.level.com.aegis=DEBUG
